name: CD

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'

jobs:
  build-and-push-api:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read # lire le repo
      packages: write # écrire sur GHCR
    

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

  build-and-push-frontend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend

      - name: Set API URL
        id: set_api
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VITE_API_URL=https://cesizencs.uaenorth.cloudapp.azure.com/api" >> $GITHUB_OUTPUT
          else
            echo "VITE_API_URL=http://${{ secrets.VM_HOST }}:3000/api" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ steps.set_api.outputs.VITE_API_URL }}


  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-push-api, build-and-push-frontend]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://20.233.249.136:5173
    steps:
      - uses: actions/checkout@v4

      - name: Config SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose to VM
        run: |
          scp docker-compose.staging.yml ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/cesizen/staging/

      - name: Run database migration
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            cd ~/cesizen/staging
            sudo docker exec cesizen_api_staging npx prisma migrate deploy --config build/prisma.config.js 2>&1
          EOF

      - name: Deploy on staging VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            cd ~/cesizen/staging
            echo 'DATABASE_URL=${{ secrets.DATABASE_URL }}' > .env
            echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> .env
            echo 'JWT_EMAIL_SECRET=${{ secrets.JWT_EMAIL_SECRET }}' >> .env
            echo 'JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}' >> .env
            echo 'POSTGRES_USER=${{ vars.POSTGRES_USER }}' >> .env
            echo 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' >> .env
            echo 'POSTGRES_DB=${{ vars.POSTGRES_DB }}' >> .env
            echo 'FRONT_URL=${{ vars.FRONT_URL }}' >> .env
            echo 'MOBILE_URL=${{ vars.MOBILE_URL }}' >> .env
            echo 'MAILTRAP_HOST=${{ vars.MAILTRAP_HOST }}' >> .env
            echo 'MAILTRAP_PORT=${{ vars.MAILTRAP_PORT }}' >> .env
            echo 'MAILTRAP_USER=${{ secrets.MAILTRAP_USER }}' >> .env
            echo 'MAILTRAP_PASS=${{ secrets.MAILTRAP_PASS }}' >> .env
            sudo docker compose -f docker-compose.staging.yml up -d --pull always
            sudo docker image prune -f
          EOF

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build-and-push-api, build-and-push-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: http://20.233.249.136:5174
    steps:
      - uses: actions/checkout@v4

      - name: Config SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose to VM
        run: |
          scp docker-compose.prod.yml ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/cesizen/prod/

      - name: Run database migration
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            cd ~/cesizen/prod
            sudo docker exec -e DATABASE_URL="${{ secrets.DATABASE_URL }}" cesizen_api_prod npx prisma migrate deploy --config build/prisma.config.js 2>&1
          EOF
              
      - name: Deploy on prod VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            cd ~/cesizen/prod
            echo 'DATABASE_URL=${{ secrets.DATABASE_URL }}' > .env
            echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> .env
            echo 'JWT_EMAIL_SECRET=${{ secrets.JWT_EMAIL_SECRET }}' >> .env
            echo 'JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}' >> .env
            echo 'POSTGRES_USER=${{ vars.POSTGRES_USER }}' >> .env
            echo 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' >> .env
            echo 'POSTGRES_DB=${{ vars.POSTGRES_DB }}' >> .env
            echo 'FRONT_URL=${{ vars.FRONT_URL }}' >> .env
            echo 'MOBILE_URL=${{ vars.MOBILE_URL }}' >> .env
            echo 'MAILTRAP_HOST=${{ vars.MAILTRAP_HOST }}' >> .env
            echo 'MAILTRAP_PORT=${{ vars.MAILTRAP_PORT }}' >> .env
            echo 'MAILTRAP_USER=${{ secrets.MAILTRAP_USER }}' >> .env
            echo 'MAILTRAP_PASS=${{ secrets.MAILTRAP_PASS }}' >> .env
            echo 'API_IMAGE=ghcr.io/carinesery/cesizen-deploy/api:${{ github.ref_name }}' >> .env
            echo 'FRONTEND_IMAGE=ghcr.io/carinesery/cesizen-deploy/frontend:${{ github.ref_name }}' >> .env
            sudo docker compose -f docker-compose.prod.yml up -d --pull always
            sudo docker image prune -f
          EOF