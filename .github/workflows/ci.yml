name: CI

on:
  push:
    branches:
      - '**'
    tags: 
      -'v*'

jobs:
  audit-api:
    runs-on: ubuntu-latest # crée une machine virtuelle Ubuntu pour exécuter le job
    steps:
      - uses: actions/checkout@v4 # met le code du repo dans VM
      - uses: actions/setup-node@v4 # installe Node.js dans la VM, ici la version 24
        with:
          node-version: 24
      - name: Install dependencies # installe les dépendances du projet
        working-directory: ./api # se place dans le dossier api pour exécuter la commande suivante
        run: npm ci
      - name: Audit
        working-directory: ./api
        run: npm audit --audit-level=high
        continue-on-error: true

  audit-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache restore
        uses: actions/cache/restore@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-api-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: ${{ runner.os }}-api-
      - name: Install dependencies
        working-directory: ./api
        run: npm ci
      - name: Lint
        working-directory: ./api
        run: npm run lint
      - name: Cache save
        uses: actions/cache/save@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-api-${{ hashFiles('./api/package-lock.json') }}

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache restore
        uses: actions/cache/restore@v5
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint
        working-directory: ./frontend
        run: npm run lint
      - name: Cache save
        uses: actions/cache/save@v5
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package-lock.json') }}
        
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: ./api
        run: npm ci
      - name: Generate Prisma client
        working-directory: ./api
        run: npx prisma generate --config src/prisma.config.ts
      - name: Test
        working-directory: ./api
        run: npm run test -- --run # indique qu'il ne faut tourner qu'une fois
              
  test-frontend-e2e:
    runs-on: ubuntu-latest
    needs: [build-frontend]
    strategy:
      matrix:
        browser: [chrome, edge]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache restore
        uses: actions/cache/restore@v5
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Start Vite dev server
        working-directory: ./frontend
        run: npm run dev > /dev/null 2>&1 &
      - name: Wait for server
        run: sleep 5
      - name: Cypress E2E tests
        working-directory: ./frontend
        run: npm run test:e2e -- --headless
  
  build-api:
    runs-on: ubuntu-latest
    needs: [lint-api] # à exécuter après les jobs de lint et audit de l'api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache restore
        uses: actions/cache/restore@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-api-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: ${{ runner.os }}-api-
      - name: Install dependencies
        working-directory: ./api
        run: npm ci
      - name: Generate Prisma client
        working-directory: ./api
        run: npx prisma generate --config src/prisma.config.ts
      - name: Build
        working-directory: ./api
        run: npm run build
      - name: Cache save
        uses: actions/cache/save@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-api-${{ hashFiles('./api/package-lock.json') }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: [lint-frontend] # à exécuter après les jobs de lint et audit du frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache restore
        uses: actions/cache/restore@v5
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build
        working-directory: ./frontend
        run: npm run build
      - name: Cache save
        uses: actions/cache/save@v5
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('./frontend/package-lock.json') }}

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # récupère tout l'historique du repo
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
       # ← NOUVEAU: Upload report
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30