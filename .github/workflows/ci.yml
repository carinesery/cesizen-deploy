name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  audit-api:
    runs-on: ubuntu-latest # crée une machine virtuelle Ubuntu pour exécuter le job
    steps:
      - uses: actions/checkout@v4 # met le code du repo dans VM
      - uses: actions/setup-node@v4 # installe Node.js dans la VM, ici la version 24
        with:
          node-version: 24
      - name: Install dependencies # installe les dépendances du projet
        working-directory: ./api # se place dans le dossier api pour exécuter la commande suivante
        run: npm ci
      - name: Generate Prisma client
        working-directory: ./api
        run: npx prisma generate
      - name: Audit
        working-directory: ./api
        run: npm audit --audit-level=high
        continue-on-error: true

  audit-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: ./api
        run: npm ci
      - name: Lint
        working-directory: ./api
        run: npm run lint

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint
        working-directory: ./frontend
        run: npm run lint

  build-api:
    runs-on: ubuntu-latest
    needs: [lint-api, audit-api] # à exécuter après les jobs de lint et audit de l'api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: ./api
        run: npm ci
      - name: Build
        working-directory: ./api
        run: npm run build

  build-frontend:
    runs-on: ubuntu-latest
    needs: [lint-frontend, audit-frontend] # à exécuter après les jobs de lint et audit du frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build
        working-directory: ./frontend
        run: npm run build

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # récupère tout l'historique du repo
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}