services:
  api:
    image: ghcr.io/carinesery/cesizen-deploy/api:develop # utiliser l'image construite et poussée par le workflow de CD
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EMAIL_SECRET=${JWT_EMAIL_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONT_URL=${FRONT_URL}
      - MOBILE_URL=${MOBILE_URL}
      - MAILTRAP_HOST=${MAILTRAP_HOST}
      - MAILTRAP_PORT=${MAILTRAP_PORT}
      - MAILTRAP_USER=${MAILTRAP_USER}
      - MAILTRAP_PASS=${MAILTRAP_PASS}
    container_name: cesizen_api_staging
    restart: always                   # ← important en prod

  frontend:
    image: ghcr.io/carinesery/cesizen-deploy/frontend:develop
    ports:
      - "5173:80"
    depends_on:
      - api
    container_name: cesizen_frontend_staging
    restart: always

  db:
    image: postgres:16-bookworm
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db/data/staging:/var/lib/postgresql/data  # ← volume local en prod, pas named volume
    container_name: postgres_db_staging
    restart: always