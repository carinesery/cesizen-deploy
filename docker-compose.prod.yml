services:
  api:
    image: ${API_IMAGE} # utiliser l'image construite et poussée par le workflow de CD
    ports:
      - "3001:3000"
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EMAIL_SECRET=${JWT_EMAIL_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONT_URL=${FRONT_URL}
      - MOBILE_URL=${MOBILE_URL}
      - MAILTRAP_HOST=${MAILTRAP_HOST}
      - MAILTRAP_PORT=${MAILTRAP_PORT}
      - MAILTRAP_USER=${MAILTRAP_USER}
      - MAILTRAP_PASS=${MAILTRAP_PASS}
    container_name: cesizen_api_prod
    restart: always                   # ← important en prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cesizen-network

  frontend:
    image: ${FRONTEND_IMAGE} # utiliser l'image construite et poussée par le workflow de CD
    ports:
      - "5174:80"
    depends_on:
      - api
    container_name: cesizen_frontend_prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-bookworm
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db/data/prod:/var/lib/postgresql/data  # ← volume local en prod, pas named volume
    container_name: postgres_db_prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    